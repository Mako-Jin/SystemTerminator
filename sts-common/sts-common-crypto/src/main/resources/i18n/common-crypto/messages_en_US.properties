crypto.algorithm.category.prng = Pseudo Random Number Generator
crypto.algorithm.category.password_hash = Password Hash Algorithm

# ==================== Security Level ====================
crypto.security_level.high = High Security
crypto.security_level.high.advice = Recommended
crypto.security_level.weak = Weak
