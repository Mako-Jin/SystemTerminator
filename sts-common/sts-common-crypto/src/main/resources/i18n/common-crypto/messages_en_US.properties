# ==================== Hash Algorithms ====================
crypto.algorithm.sha_256 = Secure Hash Algorithm 256-bit
crypto.algorithm.sha_512 = Secure Hash Algorithm 512-bit
crypto.algorithm.sm3 = Chinese National Standard SM3 Hash Algorithm
crypto.algorithm.sha_1 = Secure Hash Algorithm 160-bit (Insecure)
crypto.algorithm.md5 = Message Digest Algorithm (Insecure)

# ==================== Symmetric Algorithms ====================
crypto.algorithm.aes_256 = Advanced Encryption Standard 256-bit
crypto.algorithm.aes_128 = Advanced Encryption Standard 128-bit
crypto.algorithm.sm4 = Chinese National Standard SM4 Symmetric Encryption
crypto.algorithm.triple_des = Triple DES Encryption (Weak)
crypto.algorithm.des = Data Encryption Standard (Insecure)

# ==================== Asymmetric Algorithms ====================
crypto.algorithm.rsa_2048 = RSA Algorithm 2048-bit
crypto.algorithm.rsa_4096 = RSA Algorithm 4096-bit
crypto.algorithm.ecc_256 = Elliptic Curve Cryptography 256-bit
crypto.algorithm.sm2 = Chinese National Standard SM2 Asymmetric Encryption
crypto.algorithm.rsa_1024 = RSA Algorithm 1024-bit (Insecure)

# ==================== MAC Algorithms ====================
crypto.algorithm.hmac_sha256 = HMAC with SHA-256
crypto.algorithm.hmac_sha384 = HMAC with SHA-384
crypto.algorithm.hmac_sha512 = HMAC with SHA-512

# ==================== PRNG Algorithms ====================
crypto.algorithm.sha1prng = SHA-1 based Pseudo Random Number Generator

# ==================== Password Hash Algorithms ====================
crypto.algorithm.bcrypt = Blowfish-based password hash with automatic salting
crypto.algorithm.scrypt = Memory-hard password hash, ASIC-resistant
crypto.algorithm.argon2 = Memory-hard password hash, 2015 Password Hashing Competition winner
crypto.algorithm.pbkdf2_sha256 = HMAC-SHA256 based key derivation function, NIST standard

# ==================== JWT Signature Algorithms ====================
crypto.algorithm.hs256 = HMAC with SHA-256 (JWT Signature)
crypto.algorithm.hs384 = HMAC with SHA-384 (JWT Signature)
crypto.algorithm.hs512 = HMAC with SHA-512 (JWT Signature)
crypto.algorithm.rs256 = RSA with SHA-256 (JWT Signature), recommend 2048-bit key
crypto.algorithm.rs384 = RSA with SHA-384 (JWT Signature), recommend 2048-bit key
crypto.algorithm.rs512 = RSA with SHA-512 (JWT Signature), recommend 2048-bit key
crypto.algorithm.es256 = ECDSA with SHA-256 (JWT Signature), recommend 256-bit key
crypto.algorithm.es384 = ECDSA with SHA-384 (JWT Signature), recommend 384-bit key
crypto.algorithm.es512 = ECDSA with SHA-512 (JWT Signature), recommend 521-bit key
crypto.algorithm.ed25519 = Edwards-curve Digital Signature Algorithm (JWT), 32-byte key
crypto.algorithm.ed448 = Edwards-curve Digital Signature Algorithm (JWT), 57-byte key
crypto.algorithm.sm2_with_sm3 = Chinese SM2 with SM3 (JWT Signature)

# ==================== Implementation Sources ====================
crypto.implementation.java = Java Standard Algorithm
crypto.implementation.bouncy_castle = BouncyCastle
crypto.implementation.spring_security = Spring Security Crypto
crypto.implementation.java_15 = BouncyCastle/Java 15+


# ==================== Error Messages ====================

# JWT related
crypto.error.jwt.serialize_failed = JWT serialization failed
crypto.error.jwt.invalid_format = Invalid JWT format
crypto.error.jwt.parse_failed = JWT parse failed
crypto.error.jwt.payload_empty = payload cannot be null
crypto.error.jwt.secret_empty = secret cannot be null or blank

# Key related
crypto.error.key.empty = Key cannot be null or empty
crypto.error.key.invalid = Invalid key: {0}
crypto.error.key.length_invalid = Key length must be {0} bytes, current length: {1}
crypto.error.key.sm4_length_invalid = SM4 key length must be {0} bytes, current length: {1}

# HMAC related
crypto.error.hmac.algorithm_unavailable = HMAC-SHA512 algorithm unavailable
crypto.error.hmac.data_empty = Data to authenticate cannot be null

# Hash algorithm related
crypto.error.hash.algorithm_unsupported = Unsupported hash algorithm: {0}

# Encryption/Decryption related
crypto.error.aes_gcm.encrypt_failed = AES-GCM encryption failed
crypto.error.aes_gcm.decrypt_failed = AES-GCM decryption failed (possible wrong key or data tampered)
crypto.error.sm4.encrypt_failed = SM4 encryption failed
crypto.error.sm4.decrypt_failed = SM4 decryption failed
crypto.error.sm2.sign_failed = SM2 sign failed
crypto.error.sm2.verify_failed = SM2 verify failed

# Base32 related
crypto.error.base32.illegal_char = Illegal Base32 character: {0}

# JWT Key Generation related
crypto.error.jwt_key.generate_hmac_secret = Failed to generate default HMAC secret
crypto.error.jwt_key.generate_rsa_public = Failed to generate default RSA public key
crypto.error.jwt_key.generate_rsa_private = Failed to generate default RSA private key
crypto.error.jwt_key.generate_rsa_keypair = Failed to generate RSA key pair
crypto.error.jwt_key.algorithm_null = Algorithm cannot be null
crypto.error.jwt_key.algorithm_unsupported = Unsupported HMAC algorithm: {0}

# Base64 related
crypto.error.base64.image_encode_failed = Image Base64 encoding failed

