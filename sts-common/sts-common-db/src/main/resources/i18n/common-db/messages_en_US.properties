# SQL Security Level
db.security_level.high = High Risk
db.security_level.high.desc = Contains dangerous operations like DROP, TRUNCATE
db.security_level.medium = Medium Risk
db.security_level.medium.desc = Contains operations like ALTER, DELETE
db.security_level.low = Low Risk
db.security_level.low.desc = Contains operations like CREATE, INSERT, UPDATE
db.security_level.safe = Safe
db.security_level.safe.desc = Read-only query operations

# SQL Script Type
db.script_type.ddl = Data Definition Language
db.script_type.ddl.desc = CREATE, ALTER, DROP etc.
db.script_type.dml = Data Manipulation Language
db.script_type.dml.desc = INSERT, UPDATE, DELETE etc.
db.script_type.dql = Data Query Language
db.script_type.dql.desc = SELECT etc.
db.script_type.dcl = Data Control Language
db.script_type.dcl.desc = GRANT, REVOKE etc.
db.script_type.tcl = Transaction Control Language
db.script_type.tcl.desc = COMMIT, ROLLBACK etc.

# Database Type
db.type.mysql = MySQL
db.type.postgresql = PostgreSQL

# Migration State
db.migration.init = Database migration prepared
db.migration_state.running = Running
db.migration_state.completed = Completed
db.migration_state.failed = Failed

# Error Messages
db.error.unsupported_db_type = Unsupported database type
db.error.db_connection_empty = Database connection is empty
db.error.db_connection_failed = Failed to obtain database connection
db.error.script_execution_failed = Script execution failed
db.error.table_init_failed = Execution record table initialization failed
db.error.record_insert_failed = Execution record insertion failed
db.error.db_migration_failed = Database migration failed
