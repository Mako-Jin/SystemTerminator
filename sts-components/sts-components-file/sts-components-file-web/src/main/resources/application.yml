server:
  port: 8882

spring:
  application:
    name: sts_file
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/yc-sts-db-file?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: yc-sts-db-file
    password: yc-sts-db-file
  servlet:
    multipart:
      max-file-size: 50MB      # 单文件上限
      max-request-size: 50MB   # 整个请求上限（含多个文件+参数）


mybatis-plus:
  mapper-locations: classpath*:mappers/*.xml
  global-config:
    db-config:
      # 逻辑删除配置删除前
      logic-not-delete-value: 0
      # 逻辑删除配置删除后
      logic-delete-value: 1
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl