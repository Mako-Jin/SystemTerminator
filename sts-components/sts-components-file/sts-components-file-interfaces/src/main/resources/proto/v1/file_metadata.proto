syntax = "proto3";

package com.yaocode.sts.proto.v1;

import "file_common.proto";

option java_multiple_files = true;
option java_package = "com.yaocode.sts.components.file.interfaces.proto.v1";
option java_outer_classname = "FileMetadataProto";

// ==================== 文件元数据服务 ====================

service FileMetadataService {

  // ----- 文件信息查询 -----

  // 获取文件信息
  rpc GetFileInfo (GetFileInfoRequest) returns (FileInfo);

  // 获取文件详情
  rpc GetFileDetail (GetFileDetailRequest) returns (FileDetailInfo);

  // 批量获取文件信息
  rpc GetFileInfoBatch (GetFileInfoBatchRequest) returns (GetFileInfoBatchResponse);

  // 获取自定义元数据
  rpc GetFileMetadata (GetFileMetadataRequest) returns (GetFileMetadataResponse);

  // 获取存储信息
  rpc GetStorageInfo (GetStorageInfoRequest) returns (StorageInfoResponse);

  // 获取访问信息
  rpc GetAccessInfo (GetAccessInfoRequest) returns (AccessInfoResponse);

  // ----- 文件搜索 -----

  // 搜索文件
  rpc SearchFiles (SearchFilesRequest) returns (FilePageResponse);

  // 简单搜索
  rpc SimpleSearch (SimpleSearchRequest) returns (FilePageResponse);

  // 文件列表
  rpc ListFiles (ListFilesRequest) returns (FilePageResponse);

  // 获取我的文件
  rpc GetMyFiles (GetMyFilesRequest) returns (FilePageResponse);

  // 获取最近文件
  rpc GetRecentFiles (GetRecentFilesRequest) returns (GetRecentFilesResponse);

  // ----- 元数据更新 -----

  // 更新文件名
  rpc UpdateFileName (UpdateFileNameRequest) returns (FileInfo);

  // 更新文件标签
  rpc UpdateFileTags (UpdateFileTagsRequest) returns (FileInfo);

  // 更新文件描述
  rpc UpdateDescription (UpdateDescriptionRequest) returns (FileInfo);

  // 更新自定义元数据
  rpc UpdateMetadata (UpdateMetadataRequest) returns (UpdateMetadataResponse);

  // 添加标签
  rpc AddTags (AddTagsRequest) returns (AddTagsResponse);

  // 删除标签
  rpc RemoveTag (RemoveTagRequest) returns (RemoveTagResponse);

  // 批量更新元数据
  rpc BatchUpdateMetadata (BatchUpdateMetadataRequest) returns (BatchUpdateMetadataResponse);

  // ----- 文件类型和统计 -----

  // 获取文件类型列表
  rpc GetFileTypes (GetFileTypesRequest) returns (GetFileTypesResponse);

  // 获取文件类型统计
  rpc GetFileTypeStatistics (GetFileTypeStatisticsRequest) returns (GetFileTypeStatisticsResponse);

  // 获取存储统计
  rpc GetStorageStatistics (GetStorageStatisticsRequest) returns (GetStorageStatisticsResponse);

  // 获取文件大小分布
  rpc GetSizeDistribution (GetSizeDistributionRequest) returns (SizeDistributionResponse);

  // 获取上传趋势
  rpc GetUploadTrend (GetUploadTrendRequest) returns (GetUploadTrendResponse);

  // ----- 文件验证 -----

  // 验证文件是否存在
  rpc VerifyFileExists (VerifyFileExistsRequest) returns (VerifyFileExistsResponse);

  // 验证文件完整性
  rpc VerifyIntegrity (VerifyIntegrityRequest) returns (IntegrityCheckResponse);

  // ----- 文件对比 -----

  // 对比文件
  rpc CompareFiles (CompareFilesRequest) returns (CompareFilesResponse);

  // ----- 文件权限 -----

  // 获取文件权限
  rpc GetFilePermission (GetFilePermissionRequest) returns (PermissionInfoResponse);

  // 更新文件权限
  rpc UpdateFilePermission (UpdateFilePermissionRequest) returns (PermissionInfoResponse);

  // 设置文件公开状态
  rpc SetFilePublic (SetFilePublicRequest) returns (CommonResponse);
}

// ==================== 消息定义 ====================

// ----- 文件信息查询 -----

// 获取文件信息请求
message GetFileInfoRequest {
  string file_id = 1;
}

// 获取文件详情请求
message GetFileDetailRequest {
  string file_id = 1;
}

// 批量获取文件信息请求
message GetFileInfoBatchRequest {
  repeated string file_ids = 1;
}

// 批量获取文件信息响应
message GetFileInfoBatchResponse {
  repeated FileInfo files = 1;
  repeated string not_found_ids = 2;
}

// 获取自定义元数据请求
message GetFileMetadataRequest {
  string file_id = 1;
}

// 获取自定义元数据响应
message GetFileMetadataResponse {
  string file_id = 1;
  map<string, string> metadata = 2;
}

// 获取存储信息请求
message GetStorageInfoRequest {
  string file_id = 1;
}

// 存储信息响应
message StorageInfoResponse {
  string file_id = 1;
  string storage_type = 2;
  string bucket = 3;
  string object_key = 4;
  string region = 5;
  string endpoint = 6;
  string access_url = 7;
  string replication_status = 8;
  int64 storage_class = 9;
}

// 获取访问信息请求
message GetAccessInfoRequest {
  string file_id = 1;
}

// 访问信息响应
message AccessInfoResponse {
  string file_id = 1;
  string file_name = 2;
  bool is_public = 3;
  string url = 4;
  string access_key = 5;
  string access_secret = 6;
  int64 expiry_time = 7;
  repeated string allowed_ips = 8;
}

// ----- 文件搜索 -----

// 搜索文件请求
message SearchFilesRequest {
  string keyword = 1;
  string file_type = 2;
  string storage_type = 3;
  int64 min_size = 4;
  int64 max_size = 5;
  int32 file_status = 6;
  string upload_time_start = 7;
  string upload_time_end = 8;
  repeated string tags = 9;
  string business_id = 10;
  string business_type = 11;
  int32 page = 12;
  int32 size = 13;
  string sort_by = 14;
  string sort_order = 15;
}

// 简单搜索请求
message SimpleSearchRequest {
  string keyword = 1;
  int32 page = 2;
  int32 size = 3;
}

// 文件列表请求
message ListFilesRequest {
  string file_type = 1;
  string storage_type = 2;
  string upload_time_start = 3;
  string upload_time_end = 4;
  int64 min_size = 5;
  int64 max_size = 6;
  int32 file_status = 7;
  int32 page = 8;
  int32 size = 9;
  string sort_by = 10;
  string sort_order = 11;
}

// 获取我的文件请求
message GetMyFilesRequest {
  int32 file_status = 1;
  int32 page = 2;
  int32 size = 3;
}

// 获取最近文件请求
message GetRecentFilesRequest {
  int32 limit = 1;
}

// 获取最近文件响应
message GetRecentFilesResponse {
  repeated FileInfo files = 1;
}

// ----- 元数据更新 -----

// 更新文件名请求
message UpdateFileNameRequest {
  string file_id = 1;
  string new_file_name = 2;
}

// 更新文件标签请求
message UpdateFileTagsRequest {
  string file_id = 1;
  repeated string tags = 2;
}

// 更新文件描述请求
message UpdateDescriptionRequest {
  string file_id = 1;
  string description = 2;
}

// 更新自定义元数据请求
message UpdateMetadataRequest {
  string file_id = 1;
  map<string, string> metadata = 2;
}

// 更新自定义元数据响应
message UpdateMetadataResponse {
  string file_id = 1;
  map<string, string> metadata = 2;
}

// 添加标签请求
message AddTagsRequest {
  string file_id = 1;
  repeated string tags = 2;
}

// 添加标签响应
message AddTagsResponse {
  string file_id = 1;
  repeated string tags = 2;
}

// 删除标签请求
message RemoveTagRequest {
  string file_id = 1;
  string tag = 2;
}

// 删除标签响应
message RemoveTagResponse {
  string file_id = 1;
  repeated string tags = 2;
}

// 批量更新元数据请求
message BatchUpdateMetadataRequest {
  repeated string file_ids = 1;
  map<string, string> metadata = 2;
  string operation_type = 3;  // replace, append, delete
}

// 批量更新元数据响应
message BatchUpdateMetadataResponse {
  BatchOperationResult result = 1;
  repeated string updated_ids = 2;
}

// ----- 文件类型和统计 -----

// 获取文件类型列表请求
message GetFileTypesRequest {
  string storage_type = 1;
}

// 获取文件类型列表响应
message GetFileTypesResponse {
  repeated FileTypeItem file_types = 1;
}

// 文件类型项
message FileTypeItem {
  string file_type = 1;
  string extension = 2;
  string mime_type = 3;
  int64 file_count = 4;
}

// 获取文件类型统计请求
message GetFileTypeStatisticsRequest {
  string storage_type = 1;
}

// 文件类型统计响应
message GetFileTypeStatisticsResponse {
  repeated FileTypeStatisticsItem statistics = 1;
}

// 文件类型统计项
message FileTypeStatisticsItem {
  string file_type = 1;
  int64 file_count = 2;
  int64 total_size = 3;
  int64 avg_size = 4;
}

// 获取存储统计请求
message GetStorageStatisticsRequest {
  string storage_type = 1;
}

// 存储统计响应
message GetStorageStatisticsResponse {
  repeated StorageStatsItem statistics = 1;
}

// 存储统计项
message StorageStatsItem {
  string storage_type = 1;
  int64 file_count = 2;
  int64 total_size = 3;
  int64 used_size = 4;
  int64 available_size = 5;
  int64 capacity = 6;
  int32 usage_percent = 7;
}

// 获取大小分布请求
message GetSizeDistributionRequest {
  string storage_type = 1;
}

// 大小分布响应
message SizeDistributionResponse {
  repeated SizeDistributionItem distributions = 1;
}

// 大小分布项
message SizeDistributionItem {
  string range = 1;  // 0-1MB, 1-10MB, ...
  int64 count = 2;
  int64 total_size = 3;
  int32 percent = 4;
}

// 获取上传趋势请求
message GetUploadTrendRequest {
  string period = 1;  // day, week, month
  string start_date = 2;
  string end_date = 3;
  string storage_type = 4;
}

// 上传趋势响应
message GetUploadTrendResponse {
  repeated TrendDataItem data = 1;
}

// 趋势数据项
message TrendDataItem {
  string date = 1;
  int64 count = 2;
  int64 total_size = 3;
  int64 avg_size = 4;
}

// ----- 文件验证 -----

// 验证文件是否存在请求
message VerifyFileExistsRequest {
  string file_md5 = 1;
  int64 file_size = 2;
  string storage_type = 3;
}

// 验证文件是否存在响应
message VerifyFileExistsResponse {
  bool exists = 1;
  string file_id = 2;
  string file_name = 3;
  string file_url = 4;
  string file_md5 = 5;
  int64 file_size = 6;
}

// 验证文件完整性请求
message VerifyIntegrityRequest {
  string file_id = 1;
}

// 完整性检查响应
message IntegrityCheckResponse {
  string file_id = 1;
  bool is_valid = 2;
  string checksum_algorithm = 3;
  string expected_checksum = 4;
  string actual_checksum = 5;
  string error_message = 6;
  int64 checked_size = 7;
  int64 file_size = 8;
}

// ----- 文件对比 -----

// 对比文件请求
message CompareFilesRequest {
  string file_id1 = 1;
  string file_id2 = 2;
}

// 对比文件响应
message CompareFilesResponse {
  string file_id1 = 1;
  string file_name1 = 2;
  string file_id2 = 3;
  string file_name2 = 4;
  bool is_same = 5;
  double similarity = 6;
  repeated CompareDifference differences = 7;
}

// 对比差异项
message CompareDifference {
  string field = 1;
  string value1 = 2;
  string value2 = 3;
}

// ----- 文件权限 -----

// 获取文件权限请求
message GetFilePermissionRequest {
  string file_id = 1;
}

// 权限信息响应
message PermissionInfoResponse {
  string file_id = 1;
  string owner = 2;
  bool is_public = 3;
  repeated PermissionEntry read_permissions = 4;
  repeated PermissionEntry write_permissions = 5;
  repeated PermissionEntry delete_permissions = 6;
  repeated PermissionEntry share_permissions = 7;
}

// 权限条目
message PermissionEntry {
  string type = 1;  // user, role, group
  string id = 2;
  string name = 3;
}

// 更新文件权限请求
message UpdateFilePermissionRequest {
  string file_id = 1;
  PermissionInfoResponse permissions = 2;
}

// 设置文件公开状态请求
message SetFilePublicRequest {
  string file_id = 1;
  bool is_public = 2;
}
